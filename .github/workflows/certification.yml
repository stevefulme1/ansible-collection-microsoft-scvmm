---
name: Run collection certification checks

permissions:
  contents: read

on:
  pull_request:
    branches: [main]
  workflow_dispatch:
  schedule:
    - cron: '0 6 * * *'

concurrency:
  group: cert-ver-${{ github.head_ref || github.run_id }}
  cancel-in-progress: true

jobs:
  certification-2-16:
    uses: ansible-collections/partner-certification-checker/.github/workflows/certification-reusable.yml@eb903eae6abed6757a4dae0d665a2e3244afda00 # v1.2.0
    with:
      ansible-core-version: '2.16.0'
      python-versions: '["3.12"]'

  certification-2-20:
    uses: ansible-collections/partner-certification-checker/.github/workflows/certification-reusable.yml@eb903eae6abed6757a4dae0d665a2e3244afda00 # v1.2.0
    with:
      ansible-core-version: '2.20.0'
      python-versions: '["3.12", "3.13"]'
