---
# Audit event queries for the microsoft.scvmm collection.
# Maps each module's return data to structured facts for
# Ansible Automation Platform inventory and audit integration.
#
# Each entry uses a jq-style query to extract:
#   - name:            A unique identifier for the managed object
#   - canonical_facts: Fields that uniquely identify the object
#   - facts:           Classification metadata (infra_type, bucket, device_type)

# ---------------------------------------------------------------------------
# VM Lifecycle
# ---------------------------------------------------------------------------
microsoft.scvmm.scvmm_vm:
  query: >-
    .vm | select(. != null) | {
      name: ("scvmm_vm:" + (.id | tostring)),
      canonical_facts: {
        module: "scvmm_vm",
        id: .id
      },
      facts: {
        infra_type: "PrivateCloud",
        infra_bucket: "Compute",
        device_type: "VM"
      }
    }
microsoft.scvmm.scvmm_vm_info:
  query: >-
    .vms[] | {
      name: ("scvmm_vm_info:" + (.id | tostring)),
