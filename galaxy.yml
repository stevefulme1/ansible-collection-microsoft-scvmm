description: >-
  Ansible modules for managing Microsoft System Center Virtual Machine Manager
  (SCVMM). Provides VM lifecycle management, template operations, cloud and
  host group administration, logical network configuration, storage management,
  and library resource control. Modules are native PowerShell using
  Ansible.Basic, executing directly on the target host via WinRM or SSH.
